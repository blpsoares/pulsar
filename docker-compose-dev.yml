version: '3.3'

services:
  app-dev:
    build: .
    container_name: pulsar-dev
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./configs:/app/configs
    user: '1000:1000'
    network_mode: "host"
    # UID = echo $UID
    # GID = echo $(id -g)
  mongo_test:
    container_name: mongo_test
    image: mongo
    ports:
      - "27018:27017"


volumes:
  mongo-data:
    driver: local
