# Exemplo do comando `pulsar ttl` — cria índices TTL em massa.
# NUNCA commitar URI/credencial real aqui: use placeholder ou o mongo local.
command:
  ttl:
    source:
      uri: 'mongodb://127.0.0.1:27021/?directConnection=true'
      db: 'meu-banco'
    defaults:
      deriveFromId: true       # materializa _created a partir do _id (explícito)
      expire: 30d              # 30 dias
    collections:
      - orders                 # herda defaults (deriva _created, 30d)
      - logs                   # idem
      - name: sessions         # override
        field: lastActivity    #   usa campo Date existente
        expire: 1h             #   expira em 1h
      - name: trimestral
        field: createdAt
        expire: 3mo            # 90 dias
      # - name: qualquer-collection
      #   field: __migratedAt   # data em que o doc entrou na réplica (BSON Date)
      #   expire: 30d
      #   # ATENÇÃO: o campo `__migratedAt` SÓ existe se o banco de destino foi
      #   # criado/atualizado pelo `pulsar sync` (ele injeta esse campo, imutável,
      #   # na 1ª escrita de cada doc). Num banco que NÃO passou pelo pulsar sync
      #   # o campo não existe e o TTL não expira nada. Use-o como âncora de TTL
      #   # em collections cujo `_id` NÃO é ObjectId (onde `deriveFromId` não dá).
